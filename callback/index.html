<!DOCTYPE html>
<html lang="tr">
<head>

    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MyVolvo - Giriş Başarılı</title>
    <style>
        body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; background-color: #000; color: #fff; display: flex; align-items: center; justify-content: center; height: 100vh; margin: 0; text-align: center; }
        .container { padding: 40px; border: 1px solid #222; border-radius: 20px; background: #111; }

    </style>
</head>
<body>
    <div class="container">
        <div class="logo">MyVolvo</div>
        <h1>Giriş Başarılı!</h1>
        <p>Volvo hesabınız başarıyla doğrulandı.</p>
        <p>Lütfen uygulamaya geri dönün.</p>
    </div>
</body>
</html>
